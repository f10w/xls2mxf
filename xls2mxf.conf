[paths]
; folder with Excel traffic sheets (.xlsx)
xlsx = .
; folder with source clips (.mxf)
src = .
; base destination folder where "clips DDMMYY" is created (manual mode)
dst = .

[clipboard]
; lines that replace each gap between blocks when copying the ID list to clipboard.
; every gap (one or more empty rows) is replaced with exactly these three lines.
customline1 = customline1
customline2 = customline2
customline3 = customline3

[ffmpeg]
; paths to ffmpeg/ffprobe binaries. empty = look next to the program, then in PATH.
ffmpeg =
ffprobe =

[assembly]
; middle part of the output filename: {DD-MM-YY}_{middle}_{HH-MM}.mxf
middle = Reklama_RTR
; paths to wrapper files (broadcast-format XDCAM HD422 MXF)
opener =
closer =
; fallback source for missing clips (AVI PAL DV). Files are searched as <ID>.avi
; and transcoded to broadcast XDCAM, then placed in src.
backup_source =
; base folder for output. Files are always placed in a subfolder "broadcast DDMMYY".
; empty = the subfolder is created inside dst.
output_dir =
; video strategy: copy (video is untouched, audio is remixed; two-pass)
;                 reencode (single pass, video and audio are re-encoded)
video_mode = copy
; audio layout in the output file: 2mono (default) | stereo
audio_layout = 2mono
; output file format:
;   mxf — MXF OP1a, XDCAM HD422, mpeg2 50M + pcm_s24le  [default, broadcast]
;   mp4 — MP4, H.264 + AAC 192k  (video always re-encoded)
;   avi — AVI, mpeg2 50M + pcm_s24le  (video copy if video_mode=copy)
output_format = mxf
; H.264 bitrate for output_format=mp4. Format: 16m (16 Mbit), 500k (500 kbit).
; bufsize is set automatically as 2x bitrate.
h264_bitrate = 16m
; Number of parallel ffmpeg processes for block assembly.
;
;   workers = 1   — SEQUENTIAL [default, recommended]
;                   Blocks are assembled one by one. On a duration mismatch the
;                   program stops and asks whether to continue.
;                   Minimal system load.
;
;   workers = N   — PARALLEL (N concurrent ffmpeg processes)
;                   Faster on multi-core machines, but all duration errors are
;                   collected into the final report — no interactive prompts.
;                   Recommended only after a successful --check run.
;
;   workers = 0   — automatically set to the CPU core count (maximum load).
;
; NOTE: with workers > 1, if one block fails the rest continue assembling.
; Make sure the session has passed --check before enabling parallel mode.
workers = 1
